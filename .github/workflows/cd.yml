name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest

    steps:
      # Host/user/port/path đặt ở Settings → Secrets and variables → Actions → Variables (vars.*).
      # SSH_PRIVATE_KEY nên lưu ở Secrets (secrets.SSH_PRIVATE_KEY).
      - name: SSH vào VPS và triển khai (systemd + Puma, không Docker Compose)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT || '22' }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          envs: DEPLOY_PATH,DEPLOY_BRANCH
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"

            echo "==> Vào thư mục $DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            echo "==> Kéo code mới nhất từ branch $DEPLOY_BRANCH"
            git fetch --all --prune
            git reset --hard "origin/$DEPLOY_BRANCH"

            if [ ! -f .env ]; then
              echo "!! Thiếu file .env trên server tại $DEPLOY_PATH/.env" >&2
              exit 1
            fi

            echo "==> Nạp biến môi trường từ .env"
            set -a
            # shellcheck disable=SC1091
            . ./.env
            set +a
            export RAILS_ENV=development

            echo "==> Cài gems"
            bundle check || bundle install --jobs 4 --retry 3

            echo "==> Dọn và precompile assets"
            rm -rf public/assets
            mkdir -p public/assets
            bundle exec rails assets:clobber
            bundle exec rails assets:precompile

            echo "==> Kiểm tra asset manifest"
            APPLICATION_CSS="$(ruby -rjson -e 'manifest_path = "public/assets/.manifest.json"; abort "Missing asset manifest: #{manifest_path}" unless File.exist?(manifest_path); manifest = JSON.parse(File.read(manifest_path)); entry = manifest.fetch("application.css"); asset = entry.is_a?(Hash) ? entry.fetch("digested_path") : entry; path = File.join("public/assets", asset); abort "Missing compiled application.css: #{path}" unless File.exist?(path); print asset')"
            echo "application.css => ${APPLICATION_CSS}"
            ls -la "public/assets/${APPLICATION_CSS}"

            echo "==> Chuẩn bị database (migrate / tạo DB nếu cần)"
            bundle exec rails db:prepare

            echo "==> Chuẩn bị thư mục runtime cho Puma"
            mkdir -p tmp/pids log

            PUMA_SERVICE="${PUMA_SERVICE:-in_dai_tan_puma}"
            BIND="${BIND:-127.0.0.1}"
            PORT="${PORT:-3000}"

            if [ "$(id -u)" -eq 0 ]; then
              SYSTEMCTL=(systemctl)
              JOURNALCTL=(journalctl)
            else
              SYSTEMCTL=(sudo systemctl)
              JOURNALCTL=(sudo journalctl)
            fi

            echo "==> Khởi động lại Puma qua systemd (${PUMA_SERVICE})"
            "${SYSTEMCTL[@]}" restart "${PUMA_SERVICE}"
            "${SYSTEMCTL[@]}" is-active --quiet "${PUMA_SERVICE}"

            echo "==> Chờ Puma sẵn sàng trên ${BIND}:${PORT}"
            ready=0
            for _ in $(seq 1 30); do
              if curl -fsSI "http://${BIND}:${PORT}/" >/dev/null 2>&1; then
                ready=1
                break
              fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              echo "!! Puma chưa phản hồi sau 30s. Log gần đây:" >&2
              "${JOURNALCTL[@]}" -u "${PUMA_SERVICE}" -n 50 --no-pager >&2 || true
              exit 1
            fi

            echo "==> Kiểm tra Rails phục vụ application.css"
            curl -fsSI "http://${BIND}:${PORT}/assets/${APPLICATION_CSS}" >/dev/null

            echo "==> Trạng thái cuối"
            "${SYSTEMCTL[@]}" status "${PUMA_SERVICE}" --no-pager || true
