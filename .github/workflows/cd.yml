name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest

    steps:
      # Host/user/port/path đặt ở Settings → Secrets and variables → Actions → Variables (vars.*).
      # SSH_PRIVATE_KEY nên lưu ở Secrets (secrets.SSH_PRIVATE_KEY).
      - name: SSH vào VPS và triển khai (bin/server-dev, không Docker Compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT || '22' }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          envs: DEPLOY_PATH,DEPLOY_BRANCH
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"

            echo "==> Vào thư mục $DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            echo "==> Kéo code mới nhất từ branch $DEPLOY_BRANCH"
            git fetch --all --prune
            git reset --hard "origin/$DEPLOY_BRANCH"

            if [ ! -f .env ]; then
              echo "!! Thiếu file .env trên server tại $DEPLOY_PATH/.env" >&2
              exit 1
            fi

            echo "==> Nạp biến môi trường từ .env"
            set -a
            # shellcheck disable=SC1091
            . ./.env
            set +a
            export RAILS_ENV=development

            echo "==> Cài gems"
            bundle check || bundle install --jobs 4 --retry 3

            echo "==> Dọn và precompile assets"
            bundle exec rails assets:clobber
            bundle exec rails assets:precompile

            echo "==> Kiểm tra asset manifest"
            ruby -rjson -e '
              manifest_path = "public/assets/.manifest.json"
              abort "Missing asset manifest: #{manifest_path}" unless File.exist?(manifest_path)

              manifest = JSON.parse(File.read(manifest_path))
              asset = manifest.fetch("application.css")
              path = File.join("public/assets", asset)
              abort "Missing compiled application.css: #{path}" unless File.exist?(path)

              puts "application.css => #{asset}"
            '

            echo "==> Chuẩn bị database (migrate / tạo DB nếu cần)"
            bundle exec rails db:prepare

            echo "==> Khởi động lại app (bin/server-dev)"
            BIND="${BIND:-127.0.0.1}"
            PORT="${PORT:-3000}"
            export BIND PORT
            bin/server-dev restart

            echo "==> Trạng thái cuối"
            bin/server-dev status || true
