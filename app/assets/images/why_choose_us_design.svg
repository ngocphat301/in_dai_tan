<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72" fill="none">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a623" />
      <stop offset="48%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#e67e22" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Shield/Artboard -->
  <rect x="6" y="6" width="60" height="60" rx="16" fill="#fff" stroke="url(#brand-grad)" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Grid dots in background -->
  <circle cx="20" cy="20" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="36" cy="20" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="52" cy="20" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="20" cy="36" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="36" cy="36" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="52" cy="36" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="20" cy="52" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="36" cy="52" r="1" fill="#e67e22" opacity="0.3"/>
  <circle cx="52" cy="52" r="1" fill="#e67e22" opacity="0.3"/>

  <!-- Compass / Ruler drafting element -->
  <path d="M18 48 C 22 28, 44 28, 54 42" stroke="url(#brand-grad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="0.5 6"/>
  <path d="M18 48 C 22 28, 44 28, 54 42" stroke="url(#brand-grad)" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

  <!-- Magic Sparkles -->
  <path d="M48 20 L50 24 L54 25 L50 26 L48 30 L46 26 L42 25 L46 24 Z" fill="#f5a623"/>
  <path d="M22 38 L23 40 L25 41 L23 42 L22 44 L21 42 L19 41 L21 40 Z" fill="#e67e22" opacity="0.8"/>

  <!-- Drawing Pencil / Stylus -->
  <g transform="translate(32, 22) rotate(-45)">
    <path d="M0 0 L4 0 L4 28 L2 34 L0 28 Z" fill="url(#brand-grad)"/>
    <path d="M0 28 L4 28 L2 34 Z" fill="#333"/>
    <rect x="0" y="4" width="4" height="4" fill="#f5a623"/>
  </g>
</svg>
